image: node:18

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - npm ci
    - npm run build
    - cp build/index.html build/404.html || true
  artifacts:
    paths:
      - build

deploy:
  stage: deploy
  image: alpine:latest
  needs: ["build"]
  before_script:
    - apk add --no-cache lftp
  script:
    - lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" -e "
        set ftp:ssl-allow no;
        set ftp:passive-mode true;
        echo '--- PWD before ---';
        pwd;
        echo '--- LS before ---';
        cls -l $FTP_PATH;
        # upload build/ contents INTO public_html (not as a subfolder)
        mirror -R --delete ${APP_DIR:-.}/build $FTP_PATH;
        echo '--- LS after ---';
        cls -l $FTP_PATH;
        bye
      "
  only:
    - main

